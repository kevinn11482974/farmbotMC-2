name: Build FarmBot Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build mod with Gradle
        run: ./gradlew build

      - name: Upload .jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmbot-mod-1.21.1
          path: build/libs/farmbot-1.0.0.jar
