name: Build FarmBot Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget https://services.gradle.org/distributions/gradle-8.8-bin.zip
          unzip gradle-8.8-bin.zip
          sudo mv gradle-8.8 /opt/gradle
          echo "/opt/gradle/bin" >> $GITHUB_PATH

      - name: Build mod
        run: gradle build

      - name: Upload .jar artifact
        uses: actions/upload-artifact@v3
        with:
          name: farmbot-mod-1.21.1
          path: build/libs/farmbot-1.0.0.jar
