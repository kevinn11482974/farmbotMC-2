name: Build FarmBot Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Build mod with Gradle
        run: gradle build

      - name: Upload .jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmbot-mod-1.21.1
          path: build/libs/farmbot-1.0.0.jar
